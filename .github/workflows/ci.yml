# UH2S — CI: линт (ruff) + офлайн-тесты (unittest) на Python 3.12.
# Также проверяет, что зафиксированные зависимости (uv.lock) устанавливаются на чистой машине.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Отменяем устаревшие прогоны при новом пуше в ту же ветку/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7          # Node 24 (v4 использовал устаревший Node 20)

      # uv ставим официальным установочным скриптом (стабильный канонический URL astral) — без
      # экшена setup-uv, чтобы не зависеть от плавающих мажорных тегов и не тянуть Node-20 экшен.
      # Каталог фиксируем через UV_INSTALL_DIR (совпадает с тем, что кладём в PATH) и проверяем uv --version.
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" --version

      - name: Pin Python 3.12
        run: uv python pin 3.12       # проект требует >=3.12 (match, вложенные кавычки в f-строках)

      # Ядро + инструменты (ruff) из lock — без коннекторов (тесты офлайн и импортируют коннекторы
      # лениво, поэтому для прогона хватает ядра). Шаг заодно проверяет, что uv.lock согласован и
      # реально ставится (--frozen: ошибка, если lock разошёлся с pyproject).
      - name: Install deps from lock
        run: uv sync --frozen --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests
        run: uv run python -m unittest discover -s tests -t .
